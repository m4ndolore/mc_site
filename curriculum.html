<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Progressive curriculum for Defense Builders: from market entry through full GovCloud ops. Learn systems, compliance, and go-to-market.">
  <link rel="canonical" href="https://mergecombinator.com/curriculum">
  <meta property="og:title" content="Curriculum | Merge Combinator" />
  <meta property="og:description" content="Progressive curriculum for Defense Builders: from market entry through full GovCloud ops. Learn systems, compliance, and go-to-market." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mergecombinator.com/curriculum" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles/light-theme.css">
  <title>Curriculum — Merge Combinator</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationEvent",
    "name": "Defense Builders Curriculum",
    "url": "https://mergecombinator.com/curriculum",
    "description": "Progressive curriculum for Defense Builders: from market entry through full GovCloud ops. Learn systems, compliance, and go-to-market strategies for defense tech.",
    "about": ["defense market entry", "GovCloud compliance", "federal contracting", "national security technology"]
  }
  </script>
  <style>
    .curriculum-page { background: var(--black); color: var(--offwhite); min-height: 100vh; }
    .curriculum-container { max-width: 900px; margin: 0 auto; padding: 40px 16px; }
    .stage-header { margin-bottom: 48px; }
    .stage-title { font-size: 2rem; font-weight: 700; margin: 0 0 8px; }
    .stage-description { font-size: 1.125rem; color: var(--gray-light); margin: 0; }
    .progress-bar { height: 4px; background: var(--gray-light); border-radius: 2px; margin-bottom: 16px; }
    .progress-fill { height: 100%; background: var(--blue); transition: width 0.3s; }
    .resources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin: 32px 0; }
    .resource-card { display: block; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 20px; text-decoration: none; color: inherit; transition: all 0.2s; cursor: pointer; }
    .resource-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .resource-category { display: inline-block; padding: 4px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600; color: white; text-transform: uppercase; background: var(--blue); margin-bottom: 12px; }
    .resource-title { font-size: 1.1rem; font-weight: 600; margin: 12px 0 8px; line-height: 1.3; }
    .resource-description { font-size: 0.95rem; color: var(--gray-light); margin: 0 0 12px; line-height: 1.5; }
    .resource-meta { display: flex; gap: 12px; font-size: 0.875rem; color: var(--gray-medium); }
    .stage-actions { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.1); }
    .btn { padding: 12px 24px; border-radius: 6px; font-size: 1rem; font-weight: 500; border: none; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover:not(:disabled) { background: #2563eb; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-label { font-size: 0.875rem; color: var(--gray-medium); font-weight: 500; }
  </style>
</head>
<body class="curriculum-page">
  <a href="#curriculum-main" class="skip-link">Skip to main content</a>
  <div id="mc-navbar"></div>

  <main class="curriculum-container" id="curriculum-main">
    <div class="stage-header">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%;"></div></div>
      <p class="progress-label" id="progressLabel">Loading...</p>
      <h1 class="stage-title" id="stageTitle">Loading Curriculum...</h1>
      <p class="stage-description" id="stageDescription"></p>
    </div>
    <div class="resources-grid" id="resourcesGrid">
      <p style="grid-column: 1/-1; color: var(--gray-light);">Loading resources...</p>
    </div>
    <div class="stage-actions">
      <button class="btn btn-primary" id="advanceBtn" disabled>Loading...</button>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p>&copy; 2026 Merge Combinator. Venture studio for national security.</p>
        <div class="footer__legal">
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
          <a href="/security">Security</a>
        </div>
      </div>
    </div>
  </footer>

  <script type="module" src="/js/navbar.js"></script>
  <script>
    let currentStageIndex = 0;
    let curriculum = null;
    let progress = JSON.parse(localStorage.getItem('curriculum_progress') || '{"currentStage":"preflight","completedStages":[]}');

    async function loadCurriculum() {
      try {
        const response = await fetch('/data/curriculum.json');
        if (!response.ok) throw new Error('Failed to load curriculum');
        curriculum = await response.json();

        // Find current stage
        const stageIndex = curriculum.stages.findIndex(s => s.id === progress.currentStage);
        if (stageIndex !== -1) currentStageIndex = stageIndex;

        renderStage();
      } catch (err) {
        console.error('Error loading curriculum:', err);
        document.getElementById('stageTitle').textContent = 'Error loading curriculum';
        document.getElementById('stageDescription').textContent = err.message;
      }
    }

    function renderStage() {
      if (!curriculum || !curriculum.stages[currentStageIndex]) return;

      const stage = curriculum.stages[currentStageIndex];
      const total = curriculum.stages.length;
      const progress_percent = ((currentStageIndex + 1) / total) * 100;

      // Update progress
      document.getElementById('progressFill').style.width = progress_percent + '%';
      document.getElementById('progressLabel').textContent = `Stage ${currentStageIndex + 1} of ${total}`;

      // Update stage info
      document.getElementById('stageTitle').textContent = stage.title;
      document.getElementById('stageDescription').textContent = stage.description;

      // Render resources
      const grid = document.getElementById('resourcesGrid');
      grid.innerHTML = stage.resources.map(resource => `
        <a href="${resource.url}" target="_blank" rel="noopener" class="resource-card">
          <span class="resource-category">${resource.category}</span>
          <h3 class="resource-title">${resource.title}</h3>
          <p class="resource-description">${resource.description}</p>
          <div class="resource-meta">
            <span class="resource-type">${resource.type}</span>
            ${resource.duration ? `<span>${resource.duration}</span>` : ''}
          </div>
        </a>
      `).join('');

      // Update button
      const btn = document.getElementById('advanceBtn');
      if (currentStageIndex < total - 1) {
        btn.disabled = false;
        btn.textContent = 'I\'m ready to advance →';
        btn.onclick = () => advanceStage();
      } else {
        btn.disabled = true;
        btn.textContent = '🎉 Curriculum Complete';
      }
    }

    function advanceStage() {
      if (currentStageIndex < curriculum.stages.length - 1) {
        progress.completedStages.push(curriculum.stages[currentStageIndex].id);
        currentStageIndex++;
        progress.currentStage = curriculum.stages[currentStageIndex].id;
        localStorage.setItem('curriculum_progress', JSON.stringify(progress));
        renderStage();
      }
    }

    // Load on page load
    loadCurriculum();
  </script>
</body>
</html>
