<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // FOUC prevention: apply theme before first paint
    (function(){var t=localStorage.getItem('mc-theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}if(t==='light'){document.documentElement.classList.add('light-theme','no-transitions');requestAnimationFrame(function(){requestAnimationFrame(function(){document.documentElement.classList.remove('no-transitions')})})}})();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Read on Merge Combinator">

  <link rel="canonical" href="https://mergecombinator.com/learn/read">
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="https://imagedelivery.net/9Lsa8lkCUz_we5KeaTm7fw/logo-arrows-2/public">

  <title>Reader — Merge Combinator</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/styles/learn.css">
  <link rel="stylesheet" href="/styles/light-theme.css">

  <style>
    /* Reader page overrides — no scroll, full viewport */
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
  </style>
</head>
<body>
  <div class="reader">
    <!-- Toolbar -->
    <div class="reader__toolbar">
      <div class="reader__toolbar-left">
        <a href="/learn" class="reader__back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
          </svg>
          Library
        </a>
        <span class="reader__title">Reader</span>
      </div>

      <div class="reader__toolbar-center">
        <span class="reader__page-info">Loading...</span>
      </div>

      <div class="reader__toolbar-right">
        <button class="reader__tool-btn" id="reader-zoom-out" title="Zoom out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M8 11h6"/>
          </svg>
        </button>
        <button class="reader__tool-btn" id="reader-zoom-in" title="Zoom in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
          </svg>
        </button>
        <button class="reader__tool-btn" id="reader-fit" title="Cycle fit mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Viewport -->
    <div class="reader__viewport">
      <div class="reader__loading">
        <div class="reader__loading-spinner"></div>
        <span>Loading document...</span>
      </div>

      <div class="reader__canvas-wrap">
        <canvas id="reader-canvas"></canvas>
      </div>

      <!-- Navigation zones (hover) -->
      <div class="reader__nav-zone reader__nav-zone--prev">
        <div class="reader__nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </div>
      </div>
      <div class="reader__nav-zone reader__nav-zone--next">
        <div class="reader__nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </div>

      <div class="reader__swipe-hint">Swipe or use arrow keys to navigate</div>
    </div>

    <!-- Progress bar -->
    <div class="reader__progress">
      <div class="reader__progress-bar" style="width: 0%"></div>
    </div>
  </div>

  <script type="module" src="/js/learn/reader.js"></script>
</body>
</html>
