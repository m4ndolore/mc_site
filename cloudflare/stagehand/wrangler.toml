name = "mc-stagehand-tests"
main = "src/index.ts"
compatibility_date = "2026-02-06"
compatibility_flags = ["nodejs_compat"]

[browser]
binding = "BROWSER"

[ai]
binding = "AI"

[alias]
playwright = "@cloudflare/playwright"

[vars]
STAGING_URL = "https://mc-router-staging.defensebuilders.workers.dev"
ALLOWED_SCRAPE_DOMAINS = "govbase.com,executivegov.com,breakingdefense.com,defenseone.com"
NOTTE_API_URL = "https://api.notte.cc"

# Set NOTTE_API_KEY as a secret:
#   npx wrangler secret put NOTTE_API_KEY
