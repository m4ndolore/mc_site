<head>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/logowhite.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/logowhite.png">
  <link rel="apple-touch-icon" href="/assets/logowhite.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Join the Network — Merge Combinator">

  <meta name="twitter:image" content="/assets/logowhite.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Cloudflare Turnstile — only loaded when site key is configured via data-turnstile-site-key on <body> -->
  <script>
    if (document.currentScript) {
      var obs = new MutationObserver(function() {
        var sk = document.body && document.body.dataset.turnstileSiteKey;
        if (sk) {
          var s = document.createElement('script');
          s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
          s.async = true; s.defer = true;
          document.head.appendChild(s);
          obs.disconnect();
        }
      });
      document.addEventListener('DOMContentLoaded', function() {
        if (document.body && document.body.dataset.turnstileSiteKey) {
          var s = document.createElement('script');
          s.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';
          s.async = true; s.defer = true;
          document.head.appendChild(s);
        }
      });
    }
  </script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/onboarding.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0B0E11; }
  </style>
</head>
<body>

</body>
